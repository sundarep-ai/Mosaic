services:
  mosaic:
    # Pulls the published image by default; pin a version with MOSAIC_VERSION in .env
    # (e.g. MOSAIC_VERSION=2.0.0). The build: block is kept so contributors can still
    # build from source with `docker compose build` / `docker compose up -d --build`.
    image: srpraveen97/mosaic:${MOSAIC_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ENV=production
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      - DATA_DIR=/app/data
      # Same-origin (FastAPI serves the UI + API together) — no cross-origin CORS needed
      - CORS_ORIGINS=
    ports:
      - "${MOSAIC_PORT:-8000}:8000"
    volumes:
      - mosaic-data:/app/data
    restart: unless-stopped

volumes:
  mosaic-data:
