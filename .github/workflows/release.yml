name: Release

# Builds and publishes the Docker image whenever a version tag is pushed.
# Tagging `v2.0.0` publishes:
#   srpraveen97/mosaic:2.0.0  + :latest
#
# Requires two repository secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — a Docker Hub access token (Account Settings → Security)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Derive version from tag
        id: meta
        # v2.0.0 -> 2.0.0
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            srpraveen97/mosaic:${{ steps.meta.outputs.version }}
            srpraveen97/mosaic:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
